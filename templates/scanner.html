<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manager Scanner | Powered By Ora.Co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col p-6 text-white max-w-md mx-auto relative pb-20">
    
    <div class="flex justify-between items-center mb-6 mt-4">
        <h2 class="text-2xl font-bold">Manager Scanner</h2>
        <a href="/logout" class="text-red-400 text-sm">Exit</a>
    </div>

    <!-- Mobile Warning -->
    <div id="https-warning" class="hidden bg-yellow-500/20 border border-yellow-500 text-yellow-300 p-3 rounded-lg text-xs mb-4 text-center">
        Camera not opening? Make sure you are using <b>HTTPS</b>.
    </div>

    <div id="reader" class="bg-black w-full rounded-2xl overflow-hidden border-2 border-slate-700 mb-6"></div>

    <div id="result-box" class="p-6 rounded-2xl text-center hidden flex flex-col items-center justify-center shadow-lg">
        <h3 id="result-text" class="text-2xl font-bold mb-1"></h3>
        <p id="student-email" class="text-sm font-medium mb-4 text-white"></p>
        <button onclick="startScanner()" class="bg-slate-900/50 hover:bg-slate-900 px-6 py-3 rounded-lg font-semibold w-full transition border border-white/20">Scan Next Ticket</button>
    </div>

    <!-- REQUIRED BRANDING -->
    <div class="absolute bottom-6 w-full left-0 text-center">
        <p class="text-slate-500 text-sm font-medium tracking-widest uppercase">
            Powered by <span class="text-white font-bold tracking-normal capitalize">Ora.Co</span>
        </p>
    </div>

    <script>
        let html5QrcodeScanner;

        if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            document.getElementById('https-warning').classList.remove('hidden');
        }

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear();

            fetch('/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: decodedText })
            })
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById("result-box");
                const text = document.getElementById("result-text");
                const emailText = document.getElementById("student-email");
                box.classList.remove("hidden");
                emailText.innerText = "";
                
                if (data.status === "Accepted") {
                    box.className = "p-6 rounded-2xl text-center bg-green-600 border-4 border-green-400";
                    text.innerText = "✅ Entry Granted!";
                    emailText.innerText = "Student: " + data.student;
                } else if (data.status === "Already Used") {
                    // COUNTERFEITING CAUGHT: Red alert & identifies the user who originally owned the ticket
                    box.className = "p-6 rounded-2xl text-center bg-red-600 border-4 border-red-400";
                    text.innerText = "❌ COUNTERFEIT / REUSED";
                    emailText.innerText = "Belongs to: " + data.student;
                } else {
                    box.className = "p-6 rounded-2xl text-center bg-slate-800 border-4 border-slate-500";
                    text.innerText = "⚠️ Invalid / Fake Ticket";
                }
            });
        }

        function startScanner() {
            document.getElementById("result-box").classList.add("hidden");
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: {width: 250, height: 250}, facingMode: "environment" }
            );
            html5QrcodeScanner.render(onScanSuccess);
        }

        startScanner();
    </script>
</body>
</html>
