<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - EventPass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center text-white">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        <a href="/" class="text-slate-400 hover:text-white text-sm mb-4 inline-block">&larr; Back</a>
        <h2 class="text-2xl font-bold mb-6 capitalize">{{ role }} Login</h2>

        {% if step == "enter" %}
        <form method="POST" action="/login/{{ role }}" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="Enter university email" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 font-semibold transition">Send OTP</button>
        </form>
        {% endif %}

        {% if step == "verify" %}
        <div class="bg-green-500/20 text-green-400 p-3 rounded-lg text-sm text-center mb-4">OTP sent to {{ email }}!</div>
        <form method="POST" action="/verify" class="space-y-4">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="role" value="{{ role }}">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Enter OTP Code</label>
                <input type="text" name="otp" required placeholder="1234" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white text-center tracking-widest text-xl focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 font-semibold transition">Verify & Login</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
